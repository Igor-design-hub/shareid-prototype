<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>ShareID — Workflow Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#3253d1;--blue-h:#2a46b5;--blue-bg:#f0f3fd;--blue-l:#e8ecfb;
  --orange:#f97316;--orange-bg:#fff7ed;--orange-l:#fed7aa;
  --navy:#0c0f1a;
  --white:#fff;--bg:#f4f5f7;--bg2:#ecedf1;
  --t1:#0f1117;--t2:#1e2030;--t3:#3d4155;--t4:#6b7086;--t5:#9ca1b5;--t6:#c5c8d6;
  --brd:#dfe1ea;--brd-l:#eceef4;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased;background:var(--bg);height:100vh;overflow:hidden;margin:0}

/* App shell with sidebar */
.app{display:flex;height:100vh;overflow:hidden}
.side{width:240px;flex-shrink:0;background:var(--blue);color:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.side-hd{padding:22px 20px 14px;display:flex;align-items:center;gap:10px}
.side-logo{display:flex;align-items:center;text-decoration:none;color:#fff}
.side-logo img{height:28px;width:auto;display:block;filter:brightness(0) invert(1)}
.side-nav{padding:8px 10px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.side-sep{height:1px;background:rgba(255,255,255,.16);margin:8px 6px}
.side-item{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px;text-decoration:none;color:rgba(255,255,255,.88);font:600 13px/1 Inter,sans-serif;cursor:pointer;border:none;background:transparent;font-family:inherit;width:100%;text-align:left;transition:background .12s,color .12s}
.side-item:hover{background:rgba(255,255,255,.08);color:#fff}
.side-item.active{background:rgba(255,255,255,.12);color:#fff}
.side-item svg{width:16px;height:16px;flex-shrink:0;opacity:.88}
.side-item:hover svg,.side-item.active svg{opacity:1}
.side-item.disabled{opacity:.5;cursor:default;pointer-events:none}
.side-item .chev{margin-left:auto;width:14px;height:14px;opacity:.7;transition:transform .18s}
.side-item[aria-expanded="true"] .chev{transform:rotate(180deg)}
.side-group-body{position:relative;padding:4px 0 6px 12px;margin-left:14px;display:flex;flex-direction:column;gap:2px;border-left:1px solid rgba(255,255,255,.22)}
.side-group-body[aria-hidden="true"]{display:none}
.side-sub{display:flex;align-items:center;padding:7px 12px;border-radius:7px;text-decoration:none;color:rgba(255,255,255,.72);font:500 13px/1 Inter,sans-serif;cursor:pointer;border:1.5px solid transparent;background:transparent;transition:color .12s,border-color .12s,background .12s}
.side-sub:hover{color:#fff;background:rgba(255,255,255,.06)}
.side-sub.active{color:#fff;font-weight:600;background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.22);box-shadow:0 1px 2px rgba(0,0,0,.12)}
.side-ft{padding:12px 14px;border-top:1px solid rgba(255,255,255,.16);display:flex;align-items:center;gap:10px}
.side-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.side-user{flex:1;min-width:0}
.side-user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-user-role{font-size:10px;color:rgba(255,255,255,.62);letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.side-exit{width:28px;height:28px;border:none;background:transparent;color:rgba(255,255,255,.72);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.side-exit:hover{background:rgba(255,255,255,.12);color:#fff}
.side-exit svg{width:14px;height:14px}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ─── TOP BAR ─── */
.topbar{height:64px;border-bottom:1px solid var(--brd-l);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--white);flex-shrink:0;z-index:10;gap:16px}
.tb-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;overflow:hidden}
@media (max-width:900px){.tb-back span,.tb-back{} .tb-actions span{display:none}}
@media (max-width:640px){.tb-saved{display:none} .tb-divider{display:none}}
.logo{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;color:var(--navy);letter-spacing:-.02em;text-decoration:none;flex-shrink:0}
.logo svg{width:20px;height:20px}
.tb-back{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:7px;background:none;border:1px solid transparent;color:var(--t4);font:600 12px/1 Inter,sans-serif;text-decoration:none;cursor:pointer;transition:all .12s;flex-shrink:0}
.tb-back:hover{background:var(--bg);color:var(--t2)}
.tb-back svg{width:11px;height:11px}
.tb-divider{width:1px;height:22px;background:var(--brd-l);flex-shrink:0}
.tb-wf-name{font:700 14px/1.2 Inter,sans-serif;color:var(--t1);letter-spacing:-.01em;padding:6px 10px;border-radius:7px;border:1px solid transparent;cursor:text;background:none;outline:none;font-family:inherit;min-width:80px;max-width:340px;width:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;field-sizing:content}
.tb-wf-name:hover{background:var(--bg);border-color:var(--brd-l)}
.tb-wf-name:focus{background:var(--white);border-color:var(--blue);box-shadow:0 0 0 3px rgba(50,83,209,.12);max-width:none}
.tb-saved{font-size:11px;color:var(--t5);font-weight:500;display:inline-flex;align-items:center;gap:4px;flex-shrink:0;opacity:.85}
.tb-saved svg{width:11px;height:11px}
.tb-saved.saving{color:var(--t4)}
.tb-actions{display:flex;align-items:center;gap:8px}
.tb-btn{padding:7px 14px;border-radius:7px;border:1px solid var(--brd);background:var(--white);font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:5px}
.tb-btn svg{width:11px;height:11px}
.tb-btn:hover{border-color:var(--blue);color:var(--blue)}
.tb-cta{padding:7px 18px;border-radius:7px;background:var(--blue);color:var(--white);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .12s}
.tb-cta:hover{background:var(--blue-h)}
.tb-cta.off{background:var(--t5)!important;opacity:1;cursor:not-allowed;pointer-events:none}

/* ─── BODY ─── */
.body{flex:1;position:relative;overflow:hidden;min-height:0}

/* ─── SIDEBAR — floating panel ─── */
.sidebar{position:absolute;top:16px;left:16px;width:280px;z-index:20;background:var(--white);display:flex;flex-direction:column;border-radius:14px;border:1px solid var(--brd-l);box-shadow:0 4px 28px rgba(0,0,0,.10);max-height:calc(100% - 32px);overflow:hidden}
.canvas-mode{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:25;display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-radius:12px;padding:4px;border:1px solid var(--brd-l);box-shadow:0 2px 16px rgba(0,0,0,.08)}
.mode-b{padding:8px 20px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;color:var(--t4);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.mode-b.on{background:var(--blue);color:var(--white);box-shadow:0 2px 10px rgba(50,83,209,.3)}
.mode-badge{padding:7px 18px;border-radius:8px;background:var(--blue);color:var(--white);font-size:13px;font-weight:600;box-shadow:0 2px 10px rgba(50,83,209,.3);white-space:nowrap}
.sb-sep{height:1px;background:var(--brd-l);margin:0 14px}
.sb-head{padding:12px 16px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t5)}
.sb-hd-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--brd-l);flex-shrink:0}
.sb-hd-title{font-size:13px;font-weight:700;color:var(--t2)}
.sb-hd-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:6px;background:var(--blue-bg);color:var(--blue)}
.sb-list{padding:4px 10px 16px;display:flex;flex-direction:column;gap:0;flex:1;overflow-y:auto}
.sb-group{display:flex;flex-direction:column;gap:2px}
.sb-group+.sb-group{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd-l)}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t5);padding:8px 12px 0;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;cursor:grab;user-select:none;transition:all .12s;border:1.5px solid transparent}
.sb-item:hover{background:var(--bg);border-color:var(--brd-l)}
.sb-item:active{cursor:grabbing}
.sb-item.used{opacity:.28;cursor:not-allowed;pointer-events:none}
.sb-item.dragging{opacity:.3}
.sb-ico{width:36px;height:36px;border-radius:9px;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.sb-ico svg{width:16px;height:16px}
.sb-item:hover .sb-ico{background:var(--blue-l);color:var(--blue)}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:13px;font-weight:600;color:var(--t2)}
.sb-desc{font-size:11px;color:var(--t5);margin-top:2px}
.sb-drag{color:var(--t6);opacity:0;transition:opacity .1s;flex-shrink:0}
.sb-item:hover .sb-drag{opacity:.6}

/* ─── CANVAS WRAPPER — full screen ─── */
.canvas-wrap{position:absolute;inset:0;display:flex;overflow:hidden}

/* Floating bottom bar */
.bottom-bar{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid var(--brd-l);border-radius:14px;box-shadow:0 4px 28px rgba(0,0,0,.12);display:flex;align-items:center;overflow:hidden;white-space:nowrap}
.bb-tok{display:flex;align-items:baseline;gap:5px;padding:12px 20px}
.bb-tok-n{font-size:22px;font-weight:900;color:var(--blue);letter-spacing:-.04em;line-height:1}
.bb-tok-l{font-size:11px;color:var(--t5);font-weight:500}
.bb-sep{width:1px;height:36px;background:var(--brd-l);flex-shrink:0}
.bb-cfg{display:flex;align-items:center;gap:6px;padding:12px 18px;border:none;background:none;font-size:12px;font-weight:600;color:var(--t4);cursor:pointer;font-family:inherit;transition:color .12s}
.bb-cfg:hover{color:var(--blue)}
.bb-cfg svg{width:11px;height:11px}
.bb-cta{display:flex;align-items:center;align-self:stretch;padding:0 26px;background:var(--blue);color:var(--white);font-size:13px;font-weight:700;text-decoration:none;transition:background .12s;border-left:1px solid rgba(255,255,255,.15)}
.bb-cta:hover{background:var(--blue-h)}
.bb-cta.off{background:var(--t5);pointer-events:none;cursor:not-allowed}

/* ─── CANVAS ─── */
.canvas{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:48px 40px 80px;position:relative;
  background-image:radial-gradient(circle,#dfe1ea 1px,transparent 1px);
  background-size:22px 22px}
/* Center content when canvas is empty */
.canvas:has(.canvas-empty){align-items:center;justify-content:center;padding:0}
body.is-dragging .canvas{
  background-image:radial-gradient(circle,var(--blue-l) 1.5px,transparent 1.5px);
  cursor:copy}

/* Vertical flow */
.flow{display:flex;flex-direction:column;align-items:center;min-height:max-content}

/* Start / End caps */
.flow-cap{display:inline-flex;align-items:center;gap:6px;padding:6px 16px 6px 12px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;user-select:none;flex-shrink:0}
.flow-cap.start{background:var(--blue);color:white;box-shadow:0 2px 8px rgba(50,83,209,.35)}
.flow-cap.start::before{content:'';width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.65)}
.flow-cap.end{background:var(--white);color:var(--t5);border:1.5px solid var(--brd-l);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.flow-cap.end::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--brd)}

/* Step card */
.step{display:flex;flex-direction:column;width:280px;background:var(--white);border:1.5px solid var(--brd);border-radius:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;flex-shrink:0;position:relative;overflow:visible}
.step:hover{border-color:#b0b6cc;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.step.active{border-color:var(--blue);box-shadow:0 4px 20px rgba(50,83,209,.12)}
.step.active.done{border-color:var(--blue)}
.step.active .step-status{display:none}
.step:not(.addon-step):not(.done):not(.active){border-color:#f59e0b;border-style:dashed}
.step:not(.addon-step):not(.done):not(.active):hover{border-color:#f97316;border-style:dashed}

/* Drag grip — top center, appears on hover */
.step-grip{height:18px;display:flex;align-items:center;justify-content:center;cursor:grab;opacity:0;transition:opacity .12s;border-radius:16px 16px 0 0;flex-shrink:0;color:var(--t5)}
.step:hover .step-grip{opacity:.4}
.step-grip svg{width:18px;height:8px;display:block}
.step-grip:active{cursor:grabbing}

/* Horizontal body layout */
.step-body{padding:4px 16px 14px;display:flex;align-items:center;gap:12px}
.step-ico{width:40px;height:40px;border-radius:11px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.step.active .step-ico{background:var(--blue)}
.step-ico svg{width:16px;height:16px;color:var(--blue);transition:color .15s}
.step.active .step-ico svg{color:var(--white)}
.step-info{flex:1;min-width:0}
.step-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step.active .step-name{color:var(--blue)}
.step-sub{font-size:11px;color:var(--t5);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-status{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;background:var(--blue);box-shadow:0 0 0 2px var(--blue-l)}
.step-status svg{width:12px;height:12px}
.step-status.hidden{display:none}

/* Footer */
.step-foot{border-top:1px solid var(--brd-l);padding:9px 16px;display:flex;align-items:center;justify-content:space-between}
.step-tok{font-size:12px;font-weight:600;color:var(--t5)}
.step.done .step-tok{color:var(--blue)}
.step-tok-val{font-size:20px;font-weight:900;color:var(--blue);letter-spacing:-.04em;line-height:1}
.step-tok-lbl{font-size:10px;color:var(--blue);font-weight:600;opacity:.7;margin-left:2px}

/* Remove button */
.step-rm{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--brd-l);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t5);opacity:0;transition:opacity .1s;padding:0;position:absolute;top:6px;right:6px;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.step:hover .step-rm{opacity:1}
.step-rm:hover{color:#dc2626;border-color:#dc2626;background:#fff5f5}
.step-rm svg{width:8px;height:8px}

/* Configured step — blue accent */
.step.done{border-color:var(--blue-l)}
.step.done:hover{border-color:var(--blue)}

/* Add-on steps (Issuance, Integration) — same style as core, just narrower */
.step.ext-step,.step.int-step{width:240px}

/* Vertical connector arrow */
.conn{display:flex;flex-direction:column;align-items:center;height:44px;flex-shrink:0;position:relative;width:2px;transition:height .15s}
.conn::before{content:'';position:absolute;top:0;bottom:12px;left:50%;width:2px;background:var(--brd);transform:translateX(-50%);transition:background .15s,width .15s}
.conn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top:8px solid var(--brd);transition:border-top-color .15s}
.conn.dashed::before{background:transparent;border-left:2px dashed var(--brd-l)}
.conn.dashed::after{display:none}

/* Connector drop zone — used during canvas reorder */
.conn-pill{position:absolute;display:none;background:var(--blue);color:white;font-size:9px;font-weight:700;padding:3px 10px;border-radius:99px;white-space:nowrap;left:50%;top:50%;transform:translate(-50%,-50%);letter-spacing:.04em;pointer-events:none;z-index:10;box-shadow:0 2px 8px rgba(50,83,209,.35)}
.conn.drop-active{height:72px!important}
.conn.drop-active::before{background:var(--blue)!important;width:3px;bottom:14px}
.conn.drop-active::after{border-top-color:var(--blue)!important;border-top-width:11px;border-width:7px}
.conn.drop-active .conn-pill{display:block;animation:pillIn .1s ease-out}
@keyframes pillIn{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* During reorder — hint all connectors */
body.is-reordering .conn::before{background:var(--blue-l)}
body.is-reordering .conn::after{border-top-color:var(--blue-l)}

/* Addon step cards — no grip, not draggable */
.step.addon-step .step-grip{display:none}
.step.addon-step .step-body{padding-top:14px}

/* Panel close button */
.panel-close-btn{position:absolute;top:10px;right:10px;z-index:3;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--brd-l);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t4);flex-shrink:0;transition:all .12s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.panel-close-btn:hover{border-color:var(--brd);color:var(--t2);background:var(--bg)}
.panel-close-btn svg{width:9px;height:9px}

/* Canvas step drag reorder */
.step.step-dragging{opacity:.18;pointer-events:none;border:2px dashed var(--blue-l)!important;background:var(--blue-bg)!important;box-shadow:none!important;transform:scale(.97) rotate(-.4deg);transition:opacity .15s,transform .15s}

/* Add step button */
.add-node{width:28px;height:28px;border-radius:50%;border:1.5px dashed var(--brd-l);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t6);flex-shrink:0;transition:all .15s;padding:0}
.add-node svg{width:11px;height:11px}
.add-node:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);border-style:solid}
body.is-dragging .add-node{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);border-style:solid}

/* Empty canvas */
.canvas-empty{display:flex;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;min-width:100%}
.canvas-empty svg{color:var(--t6);opacity:.3}
.canvas-empty h2{font-size:17px;font-weight:700;color:var(--t3)}
.canvas-empty p{font-size:13px;color:var(--t5);max-width:260px;line-height:1.5}
.canvas-empty-hint{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--brd-l);font-size:12px;color:var(--t5);font-weight:500;margin-top:4px}

/* ─── RIGHT PANEL phone preview — big, bottom 1/3 overflows ─── */
.phone-wrap{position:absolute;top:10px;left:50%;transform:translateX(-50%)}
.phone-frame{width:120px;height:260px;background:var(--white);border-radius:30px;border:2px solid rgba(0,0,0,.2);box-shadow:0 20px 56px rgba(0,0,0,.22),0 4px 10px rgba(0,0,0,.1);padding:5px 5px 7px;display:flex;flex-direction:column;position:relative}
.phone-notch{width:36px;height:6px;background:rgba(0,0,0,.16);border-radius:0 0 7px 7px;position:absolute;top:5px;left:50%;transform:translateX(-50%);z-index:2}
.phone-screen{flex:1;border-radius:22px;overflow:hidden;margin-top:14px}
.phone-screen svg{width:100%;height:100%;display:block}

/* ─── SIDEBAR: configured & pending states ─── */
.sb-item.used{cursor:pointer;opacity:.65;pointer-events:auto}
.sb-item.used .sb-drag{display:none}
.sb-item.configured{background:var(--white);border-color:transparent!important;cursor:pointer;pointer-events:auto;opacity:1}
.sb-item.type-active{background:var(--blue-bg)!important;border-color:var(--blue-l)!important}
.sb-check{width:16px;height:16px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-check svg{width:8px;height:8px}
.sb-pending-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0}
.sb-pending-dot.editing{background:var(--blue)}
.sb-desc.desc-cfgd{color:var(--blue)!important;font-size:10px;opacity:.8}
.sb-desc.desc-pending{color:var(--orange)!important;font-size:10px}

/* ─── RIGHT PANEL — floating, hidden by default ─── */
.panel{position:absolute;top:16px;right:16px;width:360px;z-index:20;background:var(--white);display:none;flex-direction:column;border-radius:14px;border:1px solid var(--brd-l);box-shadow:0 4px 28px rgba(0,0,0,.10);max-height:calc(100% - 32px);overflow:hidden}
.panel.open{display:flex}
.panel-inner{width:100%;display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0}
.panel-hd{padding:0;border-bottom:1px solid var(--brd-l);flex-shrink:0;overflow:hidden}
/* Right panel phone preview */
.panel-preview{display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border-bottom:1px solid rgba(0,0,0,.07);background:var(--bg);padding:0}
.panel-illust{max-width:100%;object-fit:contain;pointer-events:none;user-select:none;display:block}
/* Panel header row */
.panel-hd-row{display:flex;align-items:center;gap:10px;padding:12px 16px}
.panel-ico{width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.panel-ico svg{width:13px;height:13px;color:var(--white)}
.panel-name{font-size:13px;font-weight:800;color:var(--navy);letter-spacing:-.01em}
.panel-desc{font-size:11px;color:var(--t5);margin-top:1px}
.panel-body{flex:1;overflow-y:auto;padding:16px 16px 12px;display:flex;flex-direction:column}
/* Panel footer — always visible */
.panel-foot{padding:12px 16px;border-top:1px solid var(--brd-l);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.panel-rm-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 0;border-radius:9px;background:none;border:1.5px solid var(--brd-l);color:var(--t4);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;width:100%}
.panel-rm-btn:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.pf-cta{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 0;border-radius:9px;background:var(--blue);color:var(--white);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .12s;text-align:center}
.pf-cta:hover{background:var(--blue-h)}
.pf-cta.off{opacity:.28;pointer-events:none}
.pf-cta svg{width:13px;height:13px}
.pf-cfg{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 0;border-radius:9px;background:none;border:1.5px solid var(--brd);color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.pf-cfg:hover{border-color:var(--blue);color:var(--blue)}
.pf-cfg svg{width:11px;height:11px}

/* Fallback popup */
#fbPopup{position:fixed;z-index:9999;background:#fff;border:1px solid var(--brd-l);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.13);min-width:180px;padding:6px;display:none}
.fb-pop-opt{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);border:none;background:none;width:100%;font-family:inherit;text-align:left;transition:background .1s}
.fb-pop-opt:hover{background:var(--bg)}
.fb-pop-opt.on{color:var(--blue);background:var(--blue-bg)}
.fb-pop-opt .fpo-chk{width:16px;height:16px;border-radius:50%;border:2px solid var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s}
.fb-pop-opt.on .fpo-chk{border-color:var(--blue);background:var(--blue)}
.fb-pop-opt.on .fpo-chk::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}

/* Add menu popup */
.add-menu{position:fixed;background:var(--white);border:1px solid var(--brd);border-radius:11px;box-shadow:0 8px 32px rgba(0,0,0,.14);padding:5px;z-index:200;min-width:168px}
.add-menu-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);border-radius:7px;font-family:inherit;text-align:left;transition:background .1s}
.add-menu-item:hover{background:var(--bg)}
.add-menu-item .ami-ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-menu-item svg{width:13px;height:13px;flex-shrink:0}
.pgrp{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t5);margin:20px 0 8px}
.pgrp:first-child{margin-top:0}
.opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;margin-bottom:3px;cursor:pointer;transition:all .1s;border:1.5px solid transparent}
.opt:hover{background:var(--bg);border-color:var(--brd-l)}
.opt.on{background:var(--blue-bg);border-color:var(--blue)}
.opt .ri{width:15px;height:15px;border-radius:50%;border:2px solid var(--t6);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.opt.on .ri{border-color:var(--blue);background:var(--blue)}
.opt .ri i{width:4px;height:4px;border-radius:50%;background:var(--white);transform:scale(0);transition:transform .1s;display:block}
.opt.on .ri i{transform:scale(1)}
.opt-body{flex:1;min-width:0}
.opt-name{font-size:13px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.opt.on .opt-name{color:var(--blue)}
.opt-desc{font-size:11px;color:var(--t5);margin-top:2px}
.opt-tok{font-size:12px;font-weight:700;color:var(--t5);flex-shrink:0}
.opt.on .opt-tok{color:var(--blue)}
.opt-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt-ico svg{width:18px;height:18px}
.skip-link{font-size:11px;font-weight:600;color:var(--t5);text-decoration:none;padding:0 16px 0 12px;border-left:1px solid var(--brd-l);white-space:nowrap;flex-shrink:0}
.skip-link:hover{color:var(--blue)}
.rec{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:2px 5px;border-radius:99px;background:var(--green-l);color:var(--green-t)}
.fb-block{margin-top:12px;padding:12px;border-radius:10px;background:var(--bg);border:1px solid var(--brd-l)}
.fb-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t4);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.fb-lbl svg{width:10px;height:10px;opacity:.5}
.fb-pills{display:flex;gap:6px;flex-wrap:wrap}
.fb-pill{padding:5px 14px;border-radius:99px;border:1.5px solid var(--brd);background:none;font-size:12px;font-weight:600;color:var(--t4);cursor:pointer;font-family:inherit;transition:all .15s}
.fb-pill:hover{border-color:var(--blue);color:var(--blue)}
.fb-pill.on{background:var(--blue);border-color:var(--blue);color:var(--white)}

/* Path toggle (Document / Wallet) */
.path-toggle{display:flex;gap:0;margin-bottom:12px;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--brd-l)}
.path-btn{flex:1;padding:7px 12px;border:none;border-radius:8px;font-size:13px;font-weight:600;color:var(--t4);cursor:pointer;font-family:inherit;background:none;transition:all .15s}
.path-btn.on{background:var(--white);color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.path-btn:hover:not(.on){color:var(--t2)}

/* Inline fallback inside preset card */
.opt-fb-wrap{border-radius:10px;overflow:hidden;border:1.5px solid var(--blue);background:var(--blue-bg)}
.opt-fb-wrap .opt{border:none;border-radius:0}
.opt.no-bottom-radius{border-bottom-left-radius:0;border-bottom-right-radius:0}
.fb-inline{padding:8px 12px;display:flex;align-items:center;gap:8px;background:rgba(50,83,209,.04)}
.fb-inline-lbl{font-size:11px;font-weight:600;color:var(--t4);white-space:nowrap}
.fb-inline .fb-pills{display:flex;gap:4px}
.fb-inline .fb-pill{padding:4px 10px;font-size:11px}

/* Integration options — uses ext-item styles (unified) */

/* Canvas fallback sub-card */
.step-fb-group{position:relative}
.fb-conn{width:32px;position:absolute;left:100%;top:50%;transform:translateY(-50%);height:2px}
.fb-sub-card-wrap{position:absolute;left:calc(100% + 32px);top:50%;transform:translateY(-50%)}
.fb-conn::before{content:'';position:absolute;top:50%;left:0;right:12px;height:2px;background:var(--brd);transform:translateY(-50%)}
.fb-conn::after{content:'';position:absolute;top:50%;right:0;transform:translateY(-50%);border:6px solid transparent;border-left:8px solid var(--brd)}
.fb-conn-uncfg::before{background:var(--brd-l)}
.fb-conn-uncfg::after{border-left-color:var(--brd-l)}
.fb-sub-card{background:var(--white);border:1.5px dashed var(--brd);border-radius:16px;cursor:pointer;transition:all .15s;overflow:hidden;display:flex;flex-direction:column}
.fb-card-body{display:flex;align-items:center;gap:12px;padding:14px 16px 14px}
.fb-sub-card:hover{border-color:#b0b6cc;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.fb-sub-badge{font-size:11px;font-weight:600;color:var(--t4);padding:14px 16px 4px;display:flex;align-items:center;gap:6px}
.fb-sub-name{font-size:13px;font-weight:700;color:var(--t1);padding:0 16px 14px;white-space:nowrap}
.fb-sub-uncfg{border-color:var(--brd)}
.fb-sub-uncfg:hover{border-color:#b0b6cc}
.fb-sub-card:not(.fb-sub-uncfg){border-color:var(--blue-l)}
.fb-sub-card:not(.fb-sub-uncfg) .fb-sub-badge{color:var(--blue)}
.fb-sub-card:not(.fb-sub-uncfg):hover{border-color:var(--blue)}
.ext-list{display:flex;flex-direction:column;gap:4px}
.ext-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .1s;border:1.5px solid var(--brd-l);background:none}
.ext-item:hover{border-color:var(--brd);background:var(--bg)}
.ext-item.on{border-color:var(--blue);background:var(--blue-bg)}
.ext-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--t6);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.ext-item.on .ext-cb{border-color:var(--blue);background:var(--blue)}
.ext-cb svg{width:8px;height:8px;color:var(--white);opacity:0;transition:.1s}
.ext-item.on .ext-cb svg{opacity:1}
.ext-item-info{flex:1;min-width:0}
.ext-item-name{font-size:13px;font-weight:600;color:var(--t2)}
.ext-item.on .ext-item-name{color:var(--blue)}
.ext-item-desc{font-size:11px;color:var(--t4);margin-top:1px}
.ext-item.on .ext-item-desc{color:var(--blue);opacity:.7}
.ext-item-tok{font-size:11px;font-weight:700;color:var(--t5);flex-shrink:0}
.ext-item.on .ext-item-tok{color:var(--blue)}
.int-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t5);margin-bottom:6px}
.int-input{width:100%;padding:9px 12px;border:1.5px solid var(--brd-l);border-radius:8px;font-size:13px;font-family:inherit;color:var(--t1);background:var(--bg);transition:border .12s}
.int-input:focus{border-color:var(--blue);background:var(--white)}

/* ─── MODAL ─── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--white);border-radius:14px;padding:20px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-t{font-size:15px;font-weight:700;color:var(--navy)}
.modal-x{width:26px;height:26px;border-radius:6px;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t4)}
.modal-x svg{width:9px;height:9px}
.modal-cp{padding:5px 11px;border-radius:6px;border:1.5px solid var(--brd-l);background:none;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit}
.modal-cp:hover{border-color:var(--blue);color:var(--blue)}
.r-code{background:#1a1d2e;border-radius:10px;padding:14px 16px;overflow-x:auto}
.r-code pre{font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:#6b7394;line-height:1.6;white-space:pre;margin:0}
.r-code .k{color:#7d8bd4}.r-code .s{color:#5ec26a}

/* ─── ACCESSIBILITY ─── */
/* Reset UA button styles for semantic buttons */
button.sb-item,button.ext-item,button.opt{-webkit-appearance:none;appearance:none;font-family:inherit;color:inherit;text-align:left;width:100%;display:flex;background:none}
/* Global focus ring — keyboard only */
:focus-visible{outline:2px solid var(--blue)!important;outline-offset:2px}
:focus:not(:focus-visible){outline:none}
/* Fix disabled buttons — real color, not opacity */
.tb-cta.off{background:var(--t5)!important;opacity:1!important;cursor:not-allowed}
.pf-cta.off{background:var(--t5)!important;opacity:1!important;cursor:not-allowed}
/* Screen-reader-only utility */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
/* Reduced motion */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}

/* ─── MICRO-ANIMATIONS ─── */
@keyframes stepIn{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:none}}
.step.step-new{animation:stepIn .28s cubic-bezier(.2,.9,.3,1.2) both}
.step.step-dragging{animation:none}

@keyframes checkPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.15) rotate(0);opacity:1}100%{transform:scale(1);opacity:1}}
.step-status.cfgd svg{animation:checkPop .35s cubic-bezier(.3,1.4,.4,1) both}


@keyframes tokPop{0%{transform:scale(1)}40%{transform:scale(1.25);color:var(--blue)}100%{transform:scale(1)}}
.tok-pulse{animation:tokPop .4s cubic-bezier(.3,1.4,.4,1)}

/* Smooth hover lift on CTAs */
.bb-cta:not(.off):hover{filter:brightness(1.08);box-shadow:inset 0 0 0 60px rgba(255,255,255,.04)}
.bb-cta{transition:background .12s,filter .15s,box-shadow .15s}

/* Step hover subtle shadow */
.step:not(.step-dragging):not(.active):hover{box-shadow:0 4px 14px rgba(17,24,39,.06)}

/* Option row press feedback */
.opt:active{transform:scale(.985)}
.opt{transition:all .1s,transform .08s}

/* Radio dot bounce when picked */
@keyframes riPop{0%{transform:scale(0)}60%{transform:scale(1.4)}100%{transform:scale(1)}}
.opt.on .ri i{animation:riPop .3s cubic-bezier(.3,1.4,.4,1)}

/* Sidebar item hover lift */
.sb-item:not(.used):hover{transform:translateX(2px)}
.sb-item{transition:all .12s,transform .15s}

/* ─── UX IMPROVEMENTS ─── */
/* Sidebar used items — clear hover/focus interactivity cue */
.sb-item.used:hover,.sb-item.used:focus-visible{opacity:1!important;background:var(--bg)!important;border-color:var(--brd-l)!important}
.sb-item.configured:hover,.sb-item.configured:focus-visible{background:#eef0f8!important;border-color:var(--blue-l)!important}
/* Step remove button — also visible when card is keyboard-focused */
.step:focus .step-rm,.step:focus-within .step-rm{opacity:1}
/* Panel preview — compact, illustration clips at bottom */
/* Fallback block — animate in on appearance */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.fb-block{animation:fadeSlideIn .18s ease-out}
/* Undo toast */
.undo-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:400;animation:toastIn .2s ease-out;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.undo-toast.out{animation:toastOut .2s ease-in forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}
.undo-btn{background:rgba(255,255,255,.2);border:none;color:white;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;transition:background .1s}
.undo-btn:hover{background:rgba(255,255,255,.3)}
/* Topbar Continue CTA */
.tb-cta-main{padding:7px 20px;border-radius:7px;background:var(--blue);color:var(--white);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center}
.tb-cta-main:hover{background:var(--blue-h)}
.tb-cta-main.off{background:var(--t5)!important;cursor:not-allowed;opacity:1;pointer-events:none}
</style>

/* ─── Workspace storage ─── */
const WS_KEY='shareid_workspaces';
const WS_ACTIVE='shareid_active_workspace';
const LEGACY_KEY='shareid_workflow';
function uid(){return 'w_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3)}
function loadWorkspaces(){try{const a=JSON.parse(localStorage.getItem(WS_KEY)||'[]');return Array.isArray(a)?a:[]}catch(e){return[]}}
function saveWorkspaces(list){try{localStorage.setItem(WS_KEY,JSON.stringify(list));}catch(e){}}
function getQueryParam(k){return new URLSearchParams(location.search).get(k)}

let workspaces=loadWorkspaces();
let currentWorkspaceId=getQueryParam('w')||localStorage.getItem(WS_ACTIVE)||null;
let currentWorkspace=currentWorkspaceId?workspaces.find(w=>w.id===currentWorkspaceId):null;

/* If no workspace specified, redirect to workspace.html.
   Migrate legacy single-workflow if present. */
if(!currentWorkspace){
  // Try to migrate legacy
  try{
    const legacy=JSON.parse(localStorage.getItem(LEGACY_KEY)||'null');
    if(legacy&&(legacy.flows||legacy.pipeline)&&!workspaces.length){
      const flows=legacy.flows||{};
      const onbPipe=flows.onboarding?.pipeline||(legacy.mode!=='auth'&&Array.isArray(legacy.pipeline)?legacy.pipeline:[]);
      const authPipe=flows.auth?.pipeline||(legacy.mode==='auth'&&Array.isArray(legacy.pipeline)?legacy.pipeline:[]);
      if((onbPipe&&onbPipe.length)||(authPipe&&authPipe.length)){
        const now=Date.now();
        currentWorkspace={id:uid(),name:'Untitled workflow',createdAt:now,updatedAt:now,flows:{onboarding:{pipeline:onbPipe},auth:{pipeline:authPipe}}};
        currentWorkspaceId=currentWorkspace.id;
        workspaces=[currentWorkspace];
        saveWorkspaces(workspaces);
        try{localStorage.setItem(WS_ACTIVE,currentWorkspaceId);}catch(e){}
      }
    }
  }catch(e){}
  if(!currentWorkspace){
    location.replace('workspace.html');

}

        onboarding:{pipeline:savedPipelines.onboarding||[],totalTok:calcTok(savedPipelines.onboarding)},
        auth:{pipeline:savedPipelines.auth||[],totalTok:calcTok(savedPipelines.auth)}

/* ─── SIDEBAR DRAG ─── */
function sbDragStart(e,type){
  if(pipeline.find(s=>s.type===type)){e.preventDefault();return}
  dragType=type;
  e.dataTransfer.setData('text/plain','SB:'+type);
  e.dataTransfer.effectAllowed='copy';
  e.currentTarget.classList.add('dragging');
  document.body.classList.add('is-dragging');
}
function sbDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.body.classList.remove('is-dragging');
  dragType=null;
}

/* ─── CANVAS REORDER DRAG ─── */
const GRIP_SVG=`<svg viewBox="0 0 18 8" fill="currentColor"><circle cx="3" cy="2" r="1.4"/><circle cx="9" cy="2" r="1.4"/><circle cx="15" cy="2" r="1.4"/><circle cx="3" cy="6" r="1.4"/><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/></svg>`;

function buildStepHTML(s,i,dragging,isAddon){
  const d=MODS[s.type];
  const done=s.config||Object.keys(s.addons||{}).length>0||Object.keys(s.intOpts||{}).length>0;
  const on=s.id===activeId;
  const tok=getTok(s);
  const statusCls=(done&&!on)?'cfgd':(done&&on?'editing':'uncfg');
  const statusLabel=done?'Configured':'Not configured';
  const isExt=s.type==='ext';const isInt=s.type==='int';
  const extraCls=(isExt?' ext-step':isInt?' int-step':'')+(isAddon?' addon-step':'');
  const draggingCls=dragging?' step-dragging':'';
  const dragAttrs=isAddon?'':`draggable="true" ondragstart="cStepDragStart(event,'${s.id}')" ondragend="cStepDragEnd(event)" ondragover="cStepDragOver(event,'${s.id}',${i})" ondrop="cStepDrop(event,'${s.id}',${i})"`;
  const kbAttrs=isAddon?'':`onkeydown="stepKeyDown(event,'${s.id}',${i})"`;
  const ariaLabel=`${d.name}, ${statusLabel}${done&&tok>0?', '+tok+' tokens':''}`;
  let h=`<div class="step${extraCls}${on?' active':''}${done?' done':''}${draggingCls}" role="button" tabindex="0" aria-pressed="${on}" aria-label="${ariaLabel}" data-sid="${s.id}" ${dragAttrs} onclick="setActive('${s.id}')" ${kbAttrs}>`;
  h+=`<div class="step-grip" aria-hidden="true" onclick="event.stopPropagation()" title="Drag to reorder · Alt+↑↓ with keyboard">${GRIP_SVG}</div>`;
  h+=`<button class="step-rm" onclick="event.stopPropagation();removeMod('${s.id}')" aria-label="Remove ${d.name}" title="Remove step">${SV.x}</button>`;
  const checkHTML=done?`<div class="step-status" aria-hidden="true" title="Configured"><svg viewBox="0 0 14 14" fill="none"><path d="M3.5 7.3l2.3 2.3 4.7-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`:'';
  h+=`<div class="step-body"><div class="step-ico" aria-hidden="true">${d.icon}</div><div class="step-info"><div class="step-name" aria-hidden="true">${d.name}</div><div class="step-sub" aria-hidden="true">${stepSub(s)}</div></div>${checkHTML}</div>`;
  if(done&&tok>0){
    const lbl=s.type==='ext'?Object.keys(s.addons).length+' add-on'+(Object.keys(s.addons).length>1?'s':''):'Configured';
    h+=`<div class="step-foot" aria-hidden="true"><span style="font-size:11px;color:var(--t5);font-weight:500">${lbl}</span><div style="display:flex;align-items:baseline;gap:2px"><span class="step-tok-val">${tok}</span><span class="step-tok-lbl">tok</span></div></div>`;
  }else{
    h+=`<div class="step-foot" aria-hidden="true"><span style="font-size:11px;color:var(--t5)">Not configured</span><div class="step-tok">— tok</div></div>`;
  }
  return h+'</div>';
}

function _renderFlowHTML(items,draggingId){
  const coreItems=items.filter(s=>s.type!=='ext'&&s.type!=='int');
  const addonItems=items.filter(s=>s.type==='ext'||s.type==='int');
  let h='<div class="flow">';
  h+=`<div class="flow-cap start" aria-hidden="true">Start</div>`;
  coreItems.forEach((s,i)=>{
    h+=`<div class="conn" aria-hidden="true" data-di="${i}" ondragover="cConnOver(event,${i})" ondrop="cConnDrop(event,${i})"></div>`;
    const presetHasFb=s.type==='doc'&&s.config&&s.config.fb;
    if(presetHasFb){
      const fbChosen=s.fb&&s.fb!=='none';
      const fbLabel=fbChosen?(s.fb==='video'?'Video capture':'Photo capture'):'Not selected';
      const fbCls=fbChosen?'':'fb-sub-uncfg';
      const chkFb=`<div class="step-status" aria-hidden="true"><svg viewBox="0 0 14 14" fill="none"><path d="M3.5 7.3l2.3 2.3 4.7-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
      h+=`<div class="step-fb-group">`;
      h+=buildStepHTML(s,i,s.id===draggingId,false);
      const fbIcon=s.fb==='video'?SV.fbVideo:s.fb==='photo'?SV.fbPhoto:SV.branch;
      h+=`<div class="fb-conn${fbChosen?'':' fb-conn-uncfg'}" aria-hidden="true"></div><div class="fb-sub-card-wrap"><div class="fb-sub-card ${fbCls}" onclick="openFbPopup('${s.id}',event)"><div class="fb-card-body"><div class="step-ico">${fbIcon}</div><div class="step-info"><div class="step-name">Fallback</div><div class="step-sub">${fbLabel}</div></div></div></div></div>`;
      h+=`</div>`;
    } else {
      h+=buildStepHTML(s,i,s.id===draggingId,false);
    }
  });
  if(addonItems.length){
    addonItems.forEach((s,i)=>{
      h+=`<div class="conn" aria-hidden="true"></div>`;
      h+=buildStepHTML(s,coreItems.length+i,false,true);
    });
  }
  const avail=(mode==='auth'?['auth','int']:['doc','face','ext','int']).filter(t=>!items.find(s=>s.type===t));
  if(avail.length){
    const di=coreItems.length;
    h+=`<div class="conn dashed" aria-hidden="true" data-di="${di}" ondragover="cConnOver(event,${di})" ondrop="cConnDrop(event,${di})"></div>`;
    h+=`<button class="add-node" onclick="addNodeClick(event)" aria-label="Add a step to the workflow" title="Add step"><svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>`;
  }
  h+=`<div class="conn dashed" aria-hidden="true"></div>`;
  h+=`<div class="flow-cap end" aria-hidden="true">End</div>`;
  return h+'</div>';
}

function cStepDragStart(e,id){
  e.stopPropagation();
  canvasDragId=id;
  liveInsertIdx=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int').findIndex(s=>s.id===id);
  e.dataTransfer.setData('text/plain','CS:'+id);
  e.dataTransfer.effectAllowed='move';
  document.body.classList.add('is-reordering');
  setTimeout(()=>_renderPreview(liveInsertIdx),0);
}
function cStepDragEnd(e){
  if(e.currentTarget)e.currentTarget.classList.remove('step-dragging');
  canvasDragId=null;liveInsertIdx=-1;
  if(dragRaf){cancelAnimationFrame(dragRaf);dragRaf=null;}
  document.body.classList.remove('is-reordering');
  renderCanvas();
}
function _updateLive(idx){
  if(idx===liveInsertIdx)return;
  liveInsertIdx=idx;
  if(!dragRaf)dragRaf=requestAnimationFrame(()=>{if(canvasDragId)_renderPreview(liveInsertIdx);dragRaf=null;});
}
function _renderPreview(insertIdx){
  const cv=$('canvas');if(!cv||!canvasDragId)return;
  const coreOnly=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int');
  const fromIdx=coreOnly.findIndex(s=>s.id===canvasDragId);
  if(fromIdx===-1)return;
  const others=coreOnly.filter(s=>s.id!==canvasDragId);
  const adj=Math.max(0,Math.min(insertIdx>fromIdx?insertIdx-1:insertIdx,others.length));
  const previewCore=[...others];previewCore.splice(adj,0,coreOnly[fromIdx]);
  const addons=pipeline.filter(s=>s.type==='ext'||s.type==='int');
  const previewAll=[...previewCore,...addons];
  cv.style.removeProperty('align-items');cv.style.removeProperty('justify-content');cv.style.removeProperty('padding');
  cv.innerHTML=_renderFlowHTML(previewAll,canvasDragId);
}
function cStepDragOver(e,stepId,stepIdx){
  if(!canvasDragId){e.preventDefault();return;}
  if(canvasDragId===stepId)return;
  e.preventDefault();e.stopPropagation();
  const rect=e.currentTarget.getBoundingClientRect();
  const srcIdx=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int').findIndex(s=>s.id===canvasDragId);
  const thr=stepIdx>srcIdx?rect.height*.3:rect.height*.7;
  _updateLive(e.clientY<rect.top+thr?stepIdx:stepIdx+1);
}
function cConnOver(e,idx){
  if(!canvasDragId){e.preventDefault();return;}
  e.preventDefault();e.stopPropagation();
  _updateLive(idx);
}
function _doReorder(insertIdx){
  const coreOnly=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int');
  const coreFromIdx=coreOnly.findIndex(s=>s.id===canvasDragId);
  const pipelineFromIdx=pipeline.findIndex(s=>s.id===canvasDragId);
  const [item]=pipeline.splice(pipelineFromIdx,1);
  const coreLen=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int').length;
  const adj=Math.max(0,Math.min(insertIdx>coreFromIdx?insertIdx-1:insertIdx,coreLen));
  pipeline.splice(adj,0,item);
  canvasDragId=null;liveInsertIdx=-1;
  document.body.classList.remove('is-reordering');
  renderAll();
}
function cStepDrop(e,stepId,stepIdx){
  if(!canvasDragId||canvasDragId===stepId)return;
  e.preventDefault();e.stopPropagation();
  const rect=e.currentTarget.getBoundingClientRect();
  const srcIdx2=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int').findIndex(s=>s.id===canvasDragId);
  const thr2=stepIdx>srcIdx2?rect.height*.3:rect.height*.7;
  _doReorder(e.clientY<rect.top+thr2?stepIdx:stepIdx+1);
}
function cConnDrop(e,idx){
  if(!canvasDragId)return;
  e.preventDefault();e.stopPropagation();
  _doReorder(idx);
}

let _deCount=0;
function canvasDragEnter(e){e.preventDefault();_deCount++;}
function canvasDragLeave(e){_deCount--;if(_deCount<=0)_deCount=0;}
function canvasDrop(e){
  e.preventDefault();_deCount=0;
  document.body.classList.remove('is-dragging');
  const raw=e.dataTransfer.getData('text/plain');
  if(raw.startsWith('CS:')){
    // Use last known liveInsertIdx, or fall back to cursor-based position
    if(canvasDragId){
      let idx=liveInsertIdx;
      if(idx<0){
        const steps=[...document.querySelectorAll('.step:not(.step-dragging)')];
        idx=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int').length;
        for(let i=0;i<steps.length;i++){const r=steps[i].getBoundingClientRect();if(e.clientY<r.top+r.height/2){idx=i;break;}}
      }
      _doReorder(idx);
    } else {canvasDragId=null;document.body.classList.remove('is-reordering');renderAll();}
    return;
  }
  const type=raw.startsWith('SB:')?raw.slice(3):raw;
  dragType=null;document.body.classList.remove('is-dragging');
  if(!type||pipeline.find(s=>s.type===type))return;
  const steps=[...document.querySelectorAll('.step')];
  let idx=pipeline.length;
  for(let i=0;i<steps.length;i++){const r=steps[i].getBoundingClientRect();if(e.clientY<r.top+r.height/2){idx=i;break;}}
  const id=type+'_'+Date.now();
  pipeline.splice(idx,0,{id,type,config:null,fb:null,addons:{}});
  activeId=id;renderAll();
}

/* ─── CORE ─── */
function removeMod(id){
  const s=pipeline.find(x=>x.id===id);
  const name=s?MODS[s.type].name:'Step';
  const idx=pipeline.findIndex(x=>x.id===id);
  if(idx===-1)return;
  lastRemoved={item:pipeline[idx],idx,prevActiveId:activeId};
  pipeline.splice(idx,1);
  if(activeId===id)activeId=pipeline.length?pipeline[pipeline.length-1].id:null;
  announceA11y(name+' removed. Press Ctrl+Z to undo.');
  renderAll();
  showUndoToast(name+' removed');
}
function showUndoToast(msg){
  document.querySelectorAll('.undo-toast').forEach(t=>t.remove());
  if(undoTimer)clearTimeout(undoTimer);
  const toast=document.createElement('div');
  toast.className='undo-toast';
  toast.setAttribute('role','status');
  toast.innerHTML=`<span>${msg}</span><button class="undo-btn" onclick="undoRemove()">Undo</button>`;
  document.body.appendChild(toast);
  undoTimer=setTimeout(()=>{toast.classList.add('out');setTimeout(()=>toast.remove(),200);},4000);
}
function undoRemove(){
  if(!lastRemoved)return;
  document.querySelectorAll('.undo-toast').forEach(t=>t.remove());
  if(undoTimer)clearTimeout(undoTimer);
  const {item,idx,prevActiveId}=lastRemoved;
  pipeline.splice(idx,0,item);
  activeId=prevActiveId;
  lastRemoved=null;
  announceA11y(MODS[item.type].name+' restored');
  renderAll();
}
function pickPreset(sid,p){const s=pipeline.find(x=>x.id===sid);if(!s)return;s.config={...p};s.fb=null;renderAll()}
function pickFb(sid,v){const s=pipeline.find(x=>x.id===sid);if(s){s.fb=v;renderAll()}}
let _fbPopupSid=null;
function openFbPopup(sid,event){
  event.stopPropagation();
  const popup=document.getElementById('fbPopup');
  if(_fbPopupSid===sid){closeFbPopup();return;}
  _fbPopupSid=sid;
  const s=pipeline.find(x=>x.id===sid);if(!s)return;
  const fbOpts=(s.config&&s.config.fbOpts)||['none','video','photo'];
  const labels={none:'None',video:'Video capture',photo:'Photo capture'};
  popup.innerHTML=fbOpts.map(o=>{
    const on=(s.fb||'none')===o;
    return`<button class="fb-pop-opt${on?' on':''}" onclick="pickFbOpt('${sid}','${o}')">`+
      `<div class="fpo-chk"></div>${labels[o]||o}</button>`;
  }).join('');
  popup.style.display='block';
  const rect=event.currentTarget.getBoundingClientRect();
  let left=rect.left;
  if(left+200>window.innerWidth-12)left=window.innerWidth-212;
  popup.style.left=left+'px';
  popup.style.top=(rect.bottom+4)+'px';
}
function closeFbPopup(){
  _fbPopupSid=null;
  const popup=document.getElementById('fbPopup');
  if(popup)popup.style.display='none';
}
function pickFbOpt(sid,v){
  const s=pipeline.find(x=>x.id===sid);if(!s)return;
  s.fb=v;
  closeFbPopup();
  renderAll();
}
function focusFallback(sid){
  setActive(sid);
  setTimeout(()=>{
    const fbEl=document.querySelector('.fb-inline');
    if(fbEl)fbEl.scrollIntoView({behavior:'smooth',block:'nearest'});

}
function togAddon(sid,k,t,l){const s=pipeline.find(x=>x.id===sid);if(!s)return;if(s.addons[k])delete s.addons[k];else s.addons[k]={t,l};renderAll()}
function setActive(id){activeId=activeId===id?null:id;renderAll()}
function setActiveByType(t){const s=pipeline.find(x=>x.type===t);if(s){activeId=s.id;renderAll();}}
function setMode(m){
  savedActiveIds[mode]=activeId;

}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey&&lastRemoved){
    e.preventDefault();undoRemove();
  }
});
function announceA11y(msg){
  const el=$('a11y-live');if(!el)return;
  el.textContent='';
  setTimeout(()=>el.textContent=msg,60);
}
function sbClickAdd(t){
  if(pipeline.find(s=>s.type===t))return;
  const id=t+'_'+Date.now();
  pipeline.push({id,type:t,config:null,fb:null,addons:{}});
  activeId=id;
  renderAll();
  announceA11y(MODS[t].name+' added to workflow');
}
function stepKeyDown(e,id,i){
  if(e.key==='Enter'||e.key===' '){e.preventDefault();setActive(id);}
  if(e.altKey&&e.key==='ArrowUp'){e.preventDefault();moveStep(id,-1);}
  if(e.altKey&&e.key==='ArrowDown'){e.preventDefault();moveStep(id,1);}
}
function moveStep(id,dir){
  const coreOnly=pipeline.filter(s=>s.type!=='ext'&&s.type!=='int');
  const ci=coreOnly.findIndex(s=>s.id===id);
  if(ci===-1)return;
  const ni=ci+dir;
  if(ni<0||ni>=coreOnly.length)return;
  const pi=pipeline.findIndex(s=>s.id===coreOnly[ci].id);
  const pj=pipeline.findIndex(s=>s.id===coreOnly[ni].id);
  [pipeline[pi],pipeline[pj]]=[pipeline[pj],pipeline[pi]];
  announceA11y(MODS[pipeline[pi].type].name+' moved '+(dir>0?'down':'up'));
  renderAll();
  setTimeout(()=>{const el=document.querySelector(`.step[data-sid="${id}"]`);if(el)el.focus();},50);
}

function renderTopbar(){

  const ok=!empty&&pipeline.filter(s=>s.type!=='int').every(s=>s.type==='ext'?Object.keys(s.addons||{}).length>0:!!s.config);
  const topCta=$('tbCtaTop');
  const pricingHref='pricing.html'+(currentWorkspaceId?('?w='+encodeURIComponent(currentWorkspaceId)):'');
  if(topCta){
    topCta.className='bb-cta'+(ok?'':' off');

    if(ok)topCta.setAttribute('href',pricingHref);else topCta.removeAttribute('href');
  }
  const tEl=$('ctokN');
  if(tEl.textContent!==String(t))tEl.textContent=t;

function savePricingData(){
  try{
    savedPipelines[mode]=pipeline;
    let t=0;pipeline.forEach(s=>t+=getTok(s));
    const calcTok=(pl)=>{let x=0;(pl||[]).forEach(s=>x+=getTok(s));return x;};
    const flows={
      onboarding:{pipeline:savedPipelines.onboarding||[],totalTok:calcTok(savedPipelines.onboarding)},
      auth:{pipeline:savedPipelines.auth||[],totalTok:calcTok(savedPipelines.auth)}
    };
    localStorage.setItem('shareid_workflow',JSON.stringify({pipeline,mode,totalTok:t,flows}));
    // Also persist to active workspace
    if(currentWorkspace){
      currentWorkspace.flows=flows;
      currentWorkspace.updatedAt=Date.now();
      const idx=workspaces.findIndex(w=>w.id===currentWorkspaceId);
      if(idx>=0)workspaces[idx]=currentWorkspace;
      saveWorkspaces(workspaces);
    }
  }catch(e){}
}
function clearPricingData(){try{localStorage.removeItem('shareid_workflow');}catch(e){}}

function renderSidebar(){
  const badge=$('sbModeBadge');
  if(badge)badge.textContent=mode==='auth'?'Authentication':'Onboarding';
  const added=new Set(pipeline.map(s=>s.type));
  const activeType=activeId?pipeline.find(s=>s.id===activeId)?.type:null;
  function renderGroup(types,label,extraCls=''){
    let h=`<div class="sb-group${extraCls?' '+extraCls:''}" role="listitem"><div class="sb-label" aria-hidden="true">${label}</div>`;
    h+=`<div role="list" aria-label="${label}">`;
    types.forEach(t=>{
      const d=MODS[t];
      const used=added.has(t);
      const isActive=used&&t===activeType;
      const stepInPipeline=pipeline.find(s=>s.type===t);
      const isCfgd=used&&stepInPipeline&&(stepInPipeline.config||Object.keys(stepInPipeline.addons||{}).length>0||Object.keys(stepInPipeline.intOpts||{}).length>0);
      let cls='sb-item';
      if(used&&isCfgd)cls+=' configured';
      else if(used)cls+=' used';
      if(isActive)cls+=' type-active';
      const stateLabel=isCfgd?'configured':used?'not configured, click to configure':'click to add, or drag onto canvas';
      const ariaLabel=`${d.name}: ${stateLabel}`;
      const clickHandler=used?`onclick="setActiveByType('${t}')"` : `onclick="sbClickAdd('${t}')"`;
      const dragAttrs=!used?`draggable="true" ondragstart="sbDragStart(event,'${t}')" ondragend="sbDragEnd(event)"`:'';
      const ariaPressed=isActive?'true':'false';
      h+=`<div role="listitem"><button class="${cls}" data-type="${t}" ${dragAttrs} ${clickHandler} aria-label="${ariaLabel}" aria-pressed="${ariaPressed}">`;
      h+=`<div class="sb-ico" aria-hidden="true">${d.icon}</div>`;
      h+=`<div class="sb-info"><div class="sb-name" aria-hidden="true">${d.name}</div>`;
      if(used&&isCfgd)h+=`<div class="sb-desc desc-cfgd" aria-hidden="true">Configured</div>`;
      else if(used)h+=`<div class="sb-desc desc-pending" aria-hidden="true">Not configured</div>`;
      else h+=`<div class="sb-desc" aria-hidden="true">${d.desc}</div>`;
      h+=`</div>`;
      if(used&&isCfgd&&!isActive)h+=`<div class="sb-check" aria-hidden="true"><svg viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
      else if(!used)h+=`<div class="sb-drag" aria-hidden="true">${SV.dots}</div>`;
      h+=`</button></div>`;
    });
    return h+'</div></div>';
  }
  if(mode==='auth'){
    $('sbList').innerHTML=renderGroup(['auth'],'Core')+renderGroup(['int'],'Integration','addons');
  } else {
    $('sbList').innerHTML=renderGroup(['doc','face'],'Core modules')+renderGroup(['ext','int'],'Add-ons','addons');
  }
}

        const hasFbInline=isOn&&p.fb;
        if(hasFbInline)h+=`<div class="opt-fb-wrap on">`;
        h+=`<button class="opt${isOn?' on':''}${hasFbInline?' no-bottom-radius':''}" onclick="pickPreset('${s.id}',${JSON.stringify(p).replace(/"/g,'&quot;')})" role="radio" aria-checked="${isOn}" aria-label="${optLabel}"><div class="ri" aria-hidden="true"><i></i></div><div class="opt-body"><div class="opt-name" aria-hidden="true">${p.l}${p.rec?' <span class="rec" aria-hidden="true">Rec</span>':''}</div><div class="opt-desc" aria-hidden="true">${p.d}</div></div><div class="opt-tok" aria-hidden="true">${p.t} tok</div></button>`;
        if(hasFbInline){
          const fbOpts=p.fbOpts||['none','video','photo'];
          const fbLabels={none:'None',video:'Video',photo:'Photo'};
          const fbPills=fbOpts.map(o=>{const isOn=o==='none'?(!s.fb||s.fb==='none'):s.fb===o;return`<button class="fb-pill${isOn?' on':''}" onclick="pickFb('${s.id}','${o}')">${fbLabels[o]}</button>`;}).join('');
          h+=`<div class="fb-inline"><div class="fb-inline-lbl">If NFC fails:</div><div class="fb-pills">${fbPills}</div></div></div>`;
        }
      });
      h+=`</div>`;
    });
  }else if(def.presets){
    def.presets.forEach(g=>{
      if(g.group)h+=`<div class="pgrp" role="heading" aria-level="3">${g.group}</div>`;
      h+=`<div role="radiogroup" aria-label="${g.group||'Options'}">`;
      g.items.forEach(p=>{
        const isOn=!!(s.config&&s.config.v===p.v);
        const optLabel=`${p.l}: ${p.d}, ${p.t} token${p.t!==1?'s':''}${p.rec?' (recommended)':''}`;
        h+=`<button class="opt${isOn?' on':''}" onclick="pickPreset('${s.id}',${JSON.stringify(p).replace(/"/g,'&quot;')})" role="radio" aria-checked="${isOn}" aria-label="${optLabel}"><div class="ri" aria-hidden="true"><i></i></div><div class="opt-body"><div class="opt-name" aria-hidden="true">${p.l}${p.rec?' <span class="rec" aria-hidden="true">Rec</span>':''}</div><div class="opt-desc" aria-hidden="true">${p.d}</div></div><div class="opt-tok" aria-hidden="true">${p.t} tok</div></button>`;
      });
      h+=`</div>`;
    });
  }
  $('panelBody').innerHTML=h;
  const pf=$('panelFoot');
  if(pf){
    pf.innerHTML=`<button class="panel-rm-btn" onclick="removeMod('${s.id}')" aria-label="Remove ${def.name} from workflow"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2.5 4h9M5.5 4V2.8a.8.8 0 01.8-.8h1.4a.8.8 0 01.8.8V4M4 4l.5 7a1 1 0 001 .9h3a1 1 0 001-.9L10 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Remove module</button>`;
    pf.style.display='';
  }
}

function buildJSON(){
  const cbEl=document.querySelector('.int-input'),cb=cbEl?cbEl.value:'',cbUrl=cb||'https://yourdomain.com/shareid/callback';
  const levels={};
  pipeline.forEach(s=>{
    if(s.type==='doc'&&s.config)levels.doc_idv={idv_level:s.config.v};
    if(s.type==='face'&&s.config)levels.face_idv={idv_level:s.config.v};
    if(s.type==='ext')for(const k of Object.keys(s.addons||{}))levels[k]={enabled:true};
    if(s.type==='auth'&&s.config){if(s.config.type==='mfa')levels.authentication={method:'mfa_3'};else levels.eudiw_pid={enabled:true}}
  });
  const cfg={credentials:{business_hash:"YOUR_HASH",api_key:"YOUR_KEY"},levels,options:{callback:{urls:[cbUrl]}}};
  const ds=pipeline.find(s=>s.type==='doc'&&s.config);
  if(ds&&ds.config.fb&&ds.fb&&ds.fb!=='none')cfg.options.fallback={enabled:true,method:ds.fb==='video'?'video_capture':'photo_capture'};
  return cfg;
}
function showJSON(){
  const j=JSON.stringify(buildJSON(),null,2);
  const colored=j.replace(/"([^"]+)":/g,'<span class="k">"$1"</span>:').replace(/: "([^"]+)"/g,': <span class="s">"$1"</span>').replace(/: (true|false)/g,': <span class="s">$1</span>');
  const d=document.createElement('div');
  d.className='modal-bg';
  d.setAttribute('role','dialog');
  d.setAttribute('aria-modal','true');
  d.setAttribute('aria-labelledby','modal-cfg-title');
  d.onclick=e=>{if(e.target===d){d.remove();onEscKey&&document.removeEventListener('keydown',onEscKey);}};
  d.innerHTML=`<div class="modal"><div class="modal-hd"><div class="modal-t" id="modal-cfg-title">API Configuration</div><div style="display:flex;gap:6px"><button class="modal-cp" aria-label="Copy configuration to clipboard" onclick="navigator.clipboard.writeText(JSON.stringify(buildJSON(),null,2));this.textContent='Copied!';this.setAttribute('aria-label','Copied to clipboard');announceA11y('Configuration copied to clipboard');setTimeout(()=>{this.textContent='Copy';this.setAttribute('aria-label','Copy configuration to clipboard');},1200)">Copy</button><button class="modal-x" onclick="this.closest('[role=dialog]').remove();document.removeEventListener('keydown',window._modalEsc);" aria-label="Close modal">${SV.x}</button></div></div><div class="r-code"><pre aria-label="API configuration JSON">${colored}</pre></div></div>`;
  document.body.appendChild(d);
  window._modalEsc=e=>{if(e.key==='Escape'){d.remove();document.removeEventListener('keydown',window._modalEsc);}};
  document.addEventListener('keydown',window._modalEsc);
  setTimeout(()=>{const x=d.querySelector('.modal-x');if(x)x.focus();},50);
}
/* ─── Workflow name (top bar) ─── */
function initWfName(){
  const inp=$('wfNameInput');
  if(!inp||!currentWorkspace)return;
  inp.value=currentWorkspace.name||'Untitled workflow';
  document.title='ShareID — '+(currentWorkspace.name||'Workflow');
  let last=inp.value;
  inp.addEventListener('focus',()=>{last=inp.value;inp.select();});
  inp.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){e.preventDefault();inp.value=last;inp.blur();}
  });
  inp.addEventListener('blur',()=>{
    const v=(inp.value||'').trim();
    if(!v){inp.value=last;return;}
    if(v===currentWorkspace.name)return;
    currentWorkspace.name=v;
    document.title='ShareID — '+v;
    autoSave();
  });
}
initWfName();
renderAll();
</script>
